backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

site_url: https://www.noultestament.ro
display_url: https://www.noultestament.ro

local_backend: true

media_folder: public/uploads
public_folder: /uploads

editor:
  preview: true

collections:
  - name: introduction
    label: Introducere
    preview_path: "/"
    files:
      - name: introduction
        label: Introducere
        file: public/content/introduction.json
        format: json
        preview_path: "/"
        fields:
          - { label: ID, name: id, widget: string, hint: "Nu modifica acest câmp." }
          - { label: Titlu meniu, name: title, widget: string }
          - { label: Subtitlu, name: subtitle, widget: string, required: false }
          - label: Paragrafe
            name: blocks
            widget: list
            collapsed: true
            summary: "{{fields.text}}"
            fields:
              - label: Tip
                name: type
                widget: select
                options:
                  - { label: Titlu, value: heading }
                  - { label: Paragraf, value: paragraph }
                  - { label: Verset, value: verse }
              - label: Text
                name: text
                widget: markdown
                minimal: true
                buttons: [bold, italic]
                hint: "Italic: _text_. Bold: **text**. Nu șterge semnele * folosite pentru note."

  - name: books
    label: Cărți
    folder: public/content/books
    extension: json
    format: json
    create: false
    preview_path: "/"
    identifier_field: navTitle
    summary: "{{navTitle}}"
    fields:
      - { label: ID, name: id, widget: string, hint: "Nu modifica acest câmp." }
      - { label: Titlu în meniu, name: navTitle, widget: string }
      - { label: Titlu complet, name: title, widget: string }
      - label: Pasaje
        name: passages
        widget: list
        collapsed: true
        summary: "{{fields.number}}. {{fields.title}}"
        fields:
          - { label: ID, name: id, widget: string, hint: "Nu modifica acest câmp." }
          - { label: Număr pasaj, name: number, widget: number, value_type: int }
          - { label: Referință, name: reference, widget: string, required: false }
          - label: Titlu pasaj
            name: title
            widget: markdown
            minimal: true
            buttons: [bold, italic]
            hint: "Poți folosi bold/italic pentru cuvinte din titlu."
          - label: Stil titlu
            name: titleStyle
            widget: select
            required: false
            default: normal
            options:
              - { label: Normal, value: normal }
              - { label: Italic, value: italic }
              - { label: Bold, value: bold }
              - { label: Bold italic, value: bold-italic }
          - label: Dimensiune titlu (%)
            name: titleSize
            widget: number
            required: false
            default: 100
            value_type: int
            min: 70
            max: 160
            step: 5
            hint: "100 este dimensiunea normală. Scade spre 70 sau crește până la 160."
          - { label: Pagină, name: pageNumber, widget: number, value_type: int, required: false }
          - label: Text
            name: blocks
            widget: list
            collapsed: true
            summary: "{{fields.text}}"
            fields:
              - label: Tip
                name: type
                widget: select
                options:
                  - { label: Subtitlu, value: heading }
                  - { label: Paragraf, value: paragraph }
                  - { label: Verset, value: verse }
              - label: Text
                name: text
                widget: markdown
                minimal: true
                buttons: [bold, italic]
                hint: "Italic: _text_. Bold: **text**. Nu șterge semnele * folosite pentru note."
              - label: Referințe note
                name: noteRefs
                widget: list
                required: false
                field: { label: Număr notă, name: noteRef, widget: number, value_type: int }
          - label: Note de subsol
            name: notes
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.number}}. {{fields.text}}"
            fields:
              - { label: Număr, name: number, widget: number, value_type: int }
              - label: Text
                name: text
                widget: markdown
                minimal: true
                buttons: [bold, italic]
                hint: "Italic: _text_. Bold: **text**. Nu șterge semnele * folosite pentru note."